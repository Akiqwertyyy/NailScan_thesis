name: nailscan
description: AI-Powered Nail Health Analysis - Flutter Mobile Application
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  # UI & Icons
  cupertino_icons: ^1.0.6
  
  # Image Handling
  image_picker: ^1.0.7
  camera: ^0.10.5+9
  
  # State Management
  provider: ^6.1.1
  
  # HTTP & API
  http: ^1.2.0
  dio: ^5.4.0
  
  # Local Storage
  shared_preferences: ^2.2.2
  path_provider: ^2.1.2
  
  # Date & Time
  intl: ^0.18.1
  
  # Animations
  flutter_animate: ^4.5.0
  firebase_core: ^4.6.0
  firebase_storage: ^13.2.0
  cloud_firestore: ^6.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true